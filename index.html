<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Liviu — Your Life, Gamified</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0c0e1a;
  --bg-panel:#171a2e;
  --bg-panel-2:#1e2138;
  --bg-elevated:#242849;
  --accent-gold:#e3b23c;
  --accent-gold-dim:#8a692a;
  --accent-violet:#8b7fd6;
  --accent-teal:#4fd1ae;
  --accent-rose:#e8768a;
  --text-primary:#eef0fa;
  --text-muted:#8891b0;
  --text-dim:#5b6284;
  --border-soft:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.16);
  --radius-s:8px;
  --radius-m:14px;
  --radius-l:22px;
  --shadow-1:0 8px 24px rgba(0,0,0,0.35);
  font-family:'Inter',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-primary);height:100%;overflow:hidden;}
body{display:flex;justify-content:center;}
#app{width:100%;max-width:480px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:
  radial-gradient(ellipse 500px 300px at 50% 0%, rgba(139,127,214,0.10), transparent 60%),
  var(--bg-deep);
  position:relative;overflow:hidden;}
::-webkit-scrollbar{width:0;height:0;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;color:inherit;}

/* ---------- Top status bar ---------- */
#topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;flex-shrink:0;}
.avatar-ring{position:relative;width:46px;height:46px;flex-shrink:0;cursor:pointer;}
.avatar-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.avatar-ring img{width:38px;height:38px;border-radius:50%;object-fit:cover;position:absolute;top:4px;left:4px;border:1px solid var(--bg-deep);}
.avatar-fallback{width:38px;height:38px;border-radius:50%;position:absolute;top:4px;left:4px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--accent-gold);}
#topbar .who{flex:1;min-width:0;}
#topbar .name-row{display:flex;align-items:baseline;gap:6px;}
#topbar .name{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topbar .lvl{font-family:'Cinzel',serif;font-size:11px;color:var(--accent-gold);letter-spacing:.3px;flex-shrink:0;}
.xpbar-track{height:6px;border-radius:4px;background:var(--bg-elevated);margin-top:5px;overflow:hidden;}
.xpbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent-violet),var(--accent-gold));transition:width .5s ease;}
#topbar .xp-num{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-dim);margin-top:2px;}

/* ---------- Views ---------- */
#views{flex:1;overflow-y:auto;padding:0 14px 90px;}
.view{display:none;animation:fadein .25s ease;}
.view.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.section-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--text-primary);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.section-title .tag{font-family:'Inter';font-size:10px;font-weight:600;color:var(--text-dim);background:var(--bg-panel-2);padding:2px 8px;border-radius:20px;}

/* ---------- Calendar ---------- */
.day-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;margin-bottom:4px;}
.day-chip{flex-shrink:0;width:46px;padding:8px 0;border-radius:var(--radius-m);background:var(--bg-panel);text-align:center;border:1px solid transparent;transition:all .15s;}
.day-chip .dow{font-size:9.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
.day-chip .dnum{font-size:15px;font-weight:700;margin-top:2px;}
.day-chip.today .dnum{color:var(--accent-gold);}
.day-chip.selected{background:linear-gradient(160deg,var(--accent-violet),#5a4fa8);border-color:transparent;}
.day-chip.selected .dow,.day-chip.selected .dnum{color:#fff;}

.timeline{position:relative;background:var(--bg-panel);border-radius:var(--radius-l);padding:10px 0;margin-top:6px;}
.hour-row{display:flex;min-height:56px;border-top:1px solid var(--border-soft);position:relative;}
.hour-row:first-child{border-top:none;}
.hour-label{width:46px;flex-shrink:0;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:4px 6px 0;text-align:right;}
.hour-slot{flex:1;position:relative;cursor:pointer;}
.hour-slot:active{background:rgba(255,255,255,0.03);}
.block-card{position:absolute;left:6px;right:6px;border-radius:10px;padding:6px 9px;font-size:11.5px;font-weight:600;color:#fff;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:2;border-left:3px solid rgba(255,255,255,.5);}
.block-card .bt{font-size:9.5px;font-weight:500;opacity:.85;}
.block-card.done{opacity:.55;text-decoration:line-through;}
.block-card.active{outline:2px solid var(--accent-gold);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(227,178,60,.4);}50%{box-shadow:0 0 0 6px rgba(227,178,60,0);}}

.fab{position:absolute;right:18px;bottom:96px;width:56px;height:56px;border-radius:50%;background:linear-gradient(150deg,var(--accent-gold),#c98f2b);display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a1200;box-shadow:0 8px 20px rgba(227,178,60,.35);z-index:20;}

/* stats chart */
.range-toggle{display:flex;gap:6px;margin-bottom:10px;}
.range-toggle button{flex:1;padding:7px 0;border-radius:10px;background:var(--bg-panel);font-size:11.5px;font-weight:600;color:var(--text-muted);}
.range-toggle button.active{background:var(--accent-violet);color:#fff;}
.chart-card{background:var(--bg-panel);border-radius:var(--radius-l);padding:16px 14px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.bar-row .bl{width:88px;font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;}
.bar-track{flex:1;height:9px;border-radius:6px;background:var(--bg-elevated);overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;}
.bar-row .bv{width:36px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);}

/* ---------- Cards / lists generic ---------- */
.card{background:var(--bg-panel);border-radius:var(--radius-l);padding:14px;margin-bottom:10px;}
.cat-card{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:var(--radius-m);background:var(--bg-panel);margin-bottom:8px;}
.cat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-info .cn{font-weight:700;font-size:13.5px;}
.cat-info .cs{font-size:10.5px;color:var(--text-dim);margin-top:1px;}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:14px;flex-shrink:0;}
.icon-btn:active{background:var(--bg-elevated);}

.quest-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg-panel-2);border-radius:12px;margin-bottom:7px;}
.quest-item .qn{flex:1;font-size:12.5px;font-weight:600;min-width:0;}
.quest-item .qmeta{font-size:9.5px;color:var(--text-dim);margin-top:2px;font-weight:500;}
.pill{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--bg-elevated);color:var(--accent-gold);flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.add-pill{width:28px;height:28px;border-radius:8px;background:var(--accent-violet);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ---------- Feed ---------- */
.post{background:var(--bg-panel);border-radius:var(--radius-l);margin-bottom:14px;overflow:hidden;}
.post-head{display:flex;align-items:center;gap:9px;padding:12px 13px 8px;}
.post-head img.pav{width:32px;height:32px;border-radius:50%;object-fit:cover;}
.post-head .pn{font-size:12.5px;font-weight:700;}
.post-head .pt{font-size:10px;color:var(--text-dim);}
.post-cat-badge{margin-left:auto;font-size:9.5px;font-weight:700;padding:4px 9px;border-radius:20px;color:#fff;}
.post-photo{width:100%;display:block;max-height:280px;object-fit:cover;}
.post-body{padding:10px 13px 4px;font-size:12.5px;line-height:1.5;}
.post-actions{display:flex;gap:16px;padding:8px 13px 12px;border-top:1px solid var(--border-soft);margin-top:6px;}
.post-actions button{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-muted);}
.post-actions button.liked{color:var(--accent-rose);}
.comments-box{padding:0 13px 12px;}
.comment-row{font-size:11.5px;margin-bottom:4px;color:var(--text-muted);}
.comment-row b{color:var(--text-primary);}
.comment-input-row{display:flex;gap:8px;margin-top:6px;}
.comment-input-row input{flex:1;background:var(--bg-panel-2);border:1px solid var(--border-soft);border-radius:20px;padding:8px 13px;font-size:12px;color:var(--text-primary);}

/* ---------- Profile ---------- */
.profile-head{display:flex;flex-direction:column;align-items:center;padding:14px 0 6px;}
.p-avatar-ring{position:relative;width:104px;height:104px;margin-bottom:10px;}
.p-avatar-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.p-avatar-ring img,.p-avatar-ring .fallback{position:absolute;top:10px;left:10px;width:84px;height:84px;border-radius:50%;object-fit:cover;}
.p-avatar-ring .fallback{background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--accent-gold);}
.p-avatar-ring .cam{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:var(--accent-gold);color:#231a04;display:flex;align-items:center;justify-content:center;font-size:13px;border:3px solid var(--bg-deep);}
.p-name{font-family:'Cinzel',serif;font-size:19px;font-weight:600;}
.p-level{font-size:12px;color:var(--accent-gold);font-weight:700;margin-top:2px;}
.p-xpwrap{width:100%;max-width:230px;margin-top:10px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px;}
.stat-box{background:var(--bg-panel);border-radius:14px;padding:11px 12px;}
.stat-box .sname{font-size:10.5px;color:var(--text-dim);font-weight:600;display:flex;align-items:center;gap:5px;}
.stat-box .sval{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;margin-top:3px;}
.stat-box .strack{height:5px;border-radius:4px;background:var(--bg-elevated);margin-top:6px;overflow:hidden;}
.stat-box .sfill{height:100%;border-radius:4px;}

.activity-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
.activity-row:last-child{border:none;}
.activity-row .adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.activity-row .atext{flex:1;font-size:12px;}
.activity-row .atime{font-size:10px;color:var(--text-dim);}
.activity-row .axp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent-gold);font-weight:700;}

.theme-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.swatch{width:40px;height:40px;border-radius:12px;border:2px solid transparent;position:relative;}
.swatch.active{border-color:#fff;}
.color-field{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-soft);}
.color-field:last-child{border:none;}
.color-field label{font-size:12.5px;font-weight:600;color:var(--text-muted);}
.color-field input[type=color]{width:34px;height:34px;border-radius:9px;border:none;padding:0;background:none;}

/* ---------- Bottom nav ---------- */
#bottomnav{position:absolute;left:0;right:0;bottom:0;display:flex;background:rgba(23,26,46,0.92);backdrop-filter:blur(14px);border-top:1px solid var(--border-soft);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--text-dim);font-size:9.5px;font-weight:600;border-radius:12px;}
.nav-btn .ni{font-size:19px;}
.nav-btn.active{color:var(--accent-gold);}

/* ---------- Forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:.2px;text-transform:uppercase;}
.field input[type=text],.field input[type=date],.field input[type=time],.field textarea{width:100%;background:var(--bg-panel-2);border:1px solid var(--border-soft);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--text-primary);outline:none;transition:border .15s;}
.field input:focus,.field textarea:focus{border-color:var(--accent-violet);}
.field textarea{resize:none;min-height:56px;}
.time-row{display:flex;gap:10px;}
.time-row .field{flex:1;}
.chip-row{display:flex;gap:7px;flex-wrap:wrap;}
.chip{padding:8px 13px;border-radius:20px;background:var(--bg-panel-2);border:1px solid var(--border-soft);font-size:12px;font-weight:600;color:var(--text-muted);}
.chip.on{background:var(--accent-violet);color:#fff;border-color:transparent;}
.reco-box{background:linear-gradient(120deg,rgba(139,127,214,.14),rgba(227,178,60,.08));border:1px solid rgba(139,127,214,.3);border-radius:12px;padding:9px 12px;font-size:11.5px;color:var(--accent-violet);display:none;align-items:center;gap:8px;margin-bottom:12px;}
.reco-box.show{display:flex;}
.reco-box b{color:var(--text-primary);}
.reco-apply{margin-left:auto;background:var(--accent-violet);color:#fff;font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:8px;flex-shrink:0;}
.subtask-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.subtask-row input[type=text]{flex:1;background:var(--bg-panel-2);border:1px solid var(--border-soft);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--text-primary);}
.small-x{color:var(--text-dim);font-size:16px;width:24px;text-align:center;}
.add-subtask-btn{font-size:11.5px;font-weight:700;color:var(--accent-violet);padding:6px 0;}

.wizard-steps{display:flex;gap:5px;margin-bottom:16px;}
.wizard-steps .ws{flex:1;height:4px;border-radius:3px;background:var(--bg-elevated);}
.wizard-steps .ws.done{background:var(--accent-gold);}
.wizard-steps .ws.on{background:var(--accent-violet);}
.step-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:14px;}
.btn{padding:12px 0;border-radius:14px;font-weight:700;font-size:13.5px;text-align:center;width:100%;}
.btn-primary{background:linear-gradient(120deg,var(--accent-gold),#c98f2b);color:#241a04;}
.btn-ghost{background:var(--bg-panel-2);color:var(--text-muted);}
.btn-danger{background:rgba(232,118,138,.14);color:var(--accent-rose);}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn-row .btn{flex:1;}

/* ---------- Modal / sheet ---------- */
.overlay{position:absolute;inset:0;background:rgba(6,7,14,0.62);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(2px);}
.overlay.show{display:flex;}
.sheet{background:var(--bg-panel);width:100%;max-height:88%;border-radius:26px 26px 0 0;padding:10px 18px 22px;overflow-y:auto;animation:slideup .25s cubic-bezier(.2,.8,.2,1);}
@keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:38px;height:4px;background:var(--border-strong);border-radius:3px;margin:6px auto 16px;}
.sheet-close{position:absolute;top:16px;right:16px;color:var(--text-dim);font-size:20px;}

/* center modal (celebration) */
.overlay.center{align-items:center;justify-content:center;}
.celebrate-sheet{background:var(--bg-panel);border-radius:26px;padding:28px 22px;width:86%;text-align:center;animation:popin .3s cubic-bezier(.2,.9,.3,1.2);border:1px solid var(--border-strong);}
@keyframes popin{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.celebrate-sheet .big-emoji{font-size:44px;margin-bottom:6px;}
.celebrate-sheet h2{font-family:'Cinzel',serif;font-size:19px;margin:4px 0 12px;}
.reward-badge{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0;}
.reward-badge .rb{background:var(--bg-panel-2);border-radius:10px;padding:8px 12px;font-size:11.5px;font-weight:700;}

.empty-state{text-align:center;padding:38px 20px;color:var(--text-dim);font-size:12.5px;}
.empty-state .ee{font-size:34px;margin-bottom:8px;display:block;}

.selected-catbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-panel-2);border-radius:12px;margin-top:8px;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar"></div>

  <div id="views">
    <div class="view" id="view-home"></div>
    <div class="view" id="view-calendar"></div>
    <div class="view" id="view-quest"></div>
    <div class="view" id="view-feed"></div>
    <div class="view" id="view-profile"></div>
  </div>

  <button class="fab" id="fabAdd">+</button>

  <div id="bottomnav"></div>
  <div class="overlay" id="overlay"><div class="sheet" id="sheetContent"></div></div>
</div>

<script>
/* =========================================================
   LIVIU — state, persistence, rendering
   ========================================================= */
const STORAGE_KEY = 'liviu-state-v1';
const uid = (p='id') => p+'-'+Math.random().toString(36).slice(2,9);
const todayStr = (d=new Date()) => d.toISOString().slice(0,10);
const pad = n => String(n).padStart(2,'0');

const STAT_META = {
  strength:{label:'Strength',icon:'💪',color:'#e8768a'},
  intellect:{label:'Intellect',icon:'🧠',color:'#7fb3e8'},
  charisma:{label:'Charisma',icon:'✨',color:'#e3b23c'},
  culture:{label:'Culture',icon:'🎭',color:'#c78be0'},
  environment:{label:'Environment',icon:'🌱',color:'#4fd1ae'},
  talent:{label:'Talent',icon:'🎨',color:'#8b7fd6'},
  discipline:{label:'Discipline',icon:'⚖️',color:'#f0a15c'},
  vitality:{label:'Vitality',icon:'🔥',color:'#e86868'},
};

function defaultCategories(){
  return [
    {id:'cat-arts',name:'Arts & Creativity',icon:'🎨',color:'#8b7fd6',builtin:true,subcategories:[
      {id:'sub-drawing',name:'Drawing'},{id:'sub-writing',name:'Writing'},{id:'sub-music',name:'Music'},{id:'sub-photo',name:'Photography'},{id:'sub-craft',name:'Crafting'}]},
    {id:'cat-mental',name:'Mental',icon:'🧠',color:'#7fb3e8',builtin:true,subcategories:[
      {id:'sub-meditate',name:'Meditation'},{id:'sub-journal',name:'Journaling'},{id:'sub-therapy',name:'Therapy'},{id:'sub-learn',name:'Learning'}]},
    {id:'cat-fitness',name:'Fitness & Health',icon:'💪',color:'#e8768a',builtin:true,subcategories:[
      {id:'sub-cardio',name:'Cardio'},{id:'sub-strength',name:'Strength Training'},{id:'sub-yoga',name:'Yoga'},{id:'sub-sleep',name:'Sleep'},{id:'sub-nutrition',name:'Nutrition'}]},
    {id:'cat-reading',name:'Reading',icon:'📚',color:'#4fd1ae',builtin:true,subcategories:[
      {id:'sub-fiction',name:'Fiction'},{id:'sub-nonfiction',name:'Non-fiction'},{id:'sub-article',name:'Articles'}]},
    {id:'cat-career',name:'Career & Productivity',icon:'💼',color:'#e3b23c',builtin:true,subcategories:[
      {id:'sub-deepwork',name:'Deep Work'},{id:'sub-meeting',name:'Meetings'},{id:'sub-skill',name:'Skill Building'}]},
    {id:'cat-social',name:'Social',icon:'🤝',color:'#e07fb0',builtin:true,subcategories:[
      {id:'sub-family',name:'Family Time'},{id:'sub-friends',name:'Friends'},{id:'sub-network',name:'Networking'}]},
    {id:'cat-finance',name:'Finance',icon:'💰',color:'#5cc98a',builtin:true,subcategories:[
      {id:'sub-budget',name:'Budgeting'},{id:'sub-invest',name:'Investing'},{id:'sub-save',name:'Saving'}]},
    {id:'cat-spirit',name:'Spirituality',icon:'🕊️',color:'#a3a8f0',builtin:true,subcategories:[
      {id:'sub-prayer',name:'Prayer'},{id:'sub-reflect',name:'Reflection'},{id:'sub-gratitude',name:'Gratitude'}]},
  ];
}
function defaultQuestLog(){
  return [
    {id:uid('q'),name:'Read at least one chapter of the book',categoryId:'cat-reading',subId:'sub-fiction',xp:20,stats:{intellect:2,discipline:1},desc:''},

const REWARD_MESSAGES = [
  '🍦 Buy yourself ice cream!','☕ Treat yourself to your favorite coffee!','🎬 Watch an episode of that show you love!',
  '🛁 Take a relaxing warm bath tonight!',"🎧 Buy that song/album you've been eyeing!",'🌸 Buy yourself a small bouquet of flowers!',
  '🍕 Order your favorite food tonight!',"📖 Buy a new book you've been wanting!",'🎮 Give yourself 1 hour of guilt-free gaming!'
];

function addActivity(text, xp, color){
  state.activityLog.unshift({id:uid('a'),text,xp,color,timestamp:Date.now()});
  state.activityLog = state.activityLog.slice(0,60);
}

function grantXP(amount, statsAward, sourceLabel, catColor){
  const p = state.profile;
  p.xp += amount;
  for(const k in statsAward){ p.stats[k] = (p.stats[k]||0) + statsAward[k]; }
  let leveledUp = false;
  while(p.xp >= p.xpToNext){
    p.xp -= p.xpToNext;
    p.level += 1;
    p.xpToNext = 100 + p.level*40;
    leveledUp = true;
  }
  addActivity(sourceLabel, amount, catColor||'#8b7fd6');
  let reward = null;
  const totalEarned = (p.level-1)*100 + p.xp; // rough cumulative marker not needed precisely
  if(p.xp - p.lastRewardAtXp >= 250 || leveledUp && p.level%3===0){
    reward = REWARD_MESSAGES[Math.floor(Math.random()*REWARD_MESSAGES.length)];
    p.lastRewardAtXp = p.xp;
  }
  persist();
  return {leveledUp, reward};
}

function catById(id){ return state.categories.find(c=>c.id===id); }
function subById(cat, id){ return cat? (cat.subcategories||[]).find(s=>s.id===id) : null; }

   AI / HEURISTIC RECOMMENDATION
   ========================================================= */
const KEYWORD_MAP = [
  [/baca|read|book|novel|chapter|artikel/i,'cat-reading','sub-fiction'],
  [/gambar|draw|sketch|lukis|paint/i,'cat-arts','sub-drawing'],
  [/tulis|writ|blog|jurnal|journal/i,'cat-mental','sub-journal'],
  [/musik|music|gitar|piano|nyanyi|sing/i,'cat-arts','sub-music'],
  [/foto|photo|camera/i,'cat-arts','sub-photo'],
  [/lari|run|jog|cardio|sepeda|cycling/i,'cat-fitness','sub-cardio'],
  [/gym|angkat beban|strength|workout/i,'cat-fitness','sub-strength'],
  [/yoga|stretch|peregangan/i,'cat-fitness','sub-yoga'],
  [/tidur|sleep|nap/i,'cat-fitness','sub-sleep'],
  [/makan|diet|nutrisi|nutrition|meal/i,'cat-fitness','sub-nutrition'],
  [/meditasi|meditate|napas|breathing/i,'cat-mental','sub-meditate'],
  [/terapi|therapy|konseling/i,'cat-mental','sub-therapy'],
  [/belajar|learn|course|kursus|study/i,'cat-mental','sub-learn'],
  [/kerja|work|project|deadline|coding|deep work/i,'cat-career','sub-deepwork'],
  [/meeting|rapat|call/i,'cat-career','sub-meeting'],
  [/skill|latihan.*(skill|kemampuan)/i,'cat-career','sub-skill'],
  [/keluarga|family/i,'cat-social','sub-family'],
  [/teman|friend|hangout|nongkrong/i,'cat-social','sub-friends'],
  [/networking|kenalan/i,'cat-social','sub-network'],
  [/budget|anggaran/i,'cat-finance','sub-budget'],
  [/invest|saham/i,'cat-finance','sub-invest'],
  [/nabung|saving|menabung/i,'cat-finance','sub-save'],
  [/doa|pray|ibadah/i,'cat-spirit','sub-prayer'],
  [/refleksi|reflect|renung/i,'cat-spirit','sub-reflect'],
  [/syukur|gratitude|bersyukur/i,'cat-spirit','sub-gratitude'],
  [/bersih|clean|beres|organize|rapi/i,'cat-fitness','sub-nutrition'],
];
function heuristicRecommend(text){
  for(const [re,cat,sub] of KEYWORD_MAP){
    if(re.test(text)) return {categoryId:cat, subId:sub};
  }
  return null;
}
function heuristicXpStats(text, categoryId){
  const cat = catById(categoryId);
  const base = 15 + Math.floor(Math.random()*10);
  const statPairs = {
    'cat-arts':{talent:2,culture:1},'cat-mental':{intellect:2,discipline:1},
    'cat-fitness':{strength:2,vitality:2},'cat-reading':{intellect:2,discipline:1},
    'cat-career':{discipline:3,intellect:1},'cat-social':{charisma:2},
    'cat-finance':{discipline:2},'cat-spirit':{culture:1,intellect:1}
  };
  return {xp:base, stats: statPairs[categoryId] || {discipline:1}};
}
async function aiRecommend(taskName){
  const local = heuristicRecommend(taskName);
  try{
    const catNames = state.categories.map(c=>`${c.id}:${c.name}(sub: ${(c.subcategories||[]).map(s=>s.id+':'+s.name).join(', ')})`).join(' | ');
    const prompt = `Task name: "${taskName}". Choose the single best matching category id and subcategory id from this list: ${catNames}. Also suggest fair xp (10-40) and 1-2 relevant stat awards (1-3 points each) from: strength,intellect,charisma,culture,environment,talent,discipline,vitality. Respond ONLY with compact JSON like {"categoryId":"cat-x","subId":"sub-y","xp":20,"stats":{"intellect":2}}. No prose, no markdown.`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const txt = (data.content||[]).map(b=>b.text||'').join('').trim().replace(/```json|```/g,'');
    const parsed = JSON.parse(txt);
    if(parsed.categoryId && catById(parsed.categoryId)) return parsed;
  }catch(e){ /* fall through to heuristic */ }
  if(local){
    const xs = heuristicXpStats(taskName, local.categoryId);
    return {categoryId:local.categoryId, subId:local.subId, xp:xs.xp, stats:xs.stats};
  }
  return null;
}

function renderCalendar(){
  const el = document.getElementById('view-calendar');
  const base = new Date();
  base.setDate(base.getDate()-3);
  let strip='';
  for(let i=0;i<10;i++){
    const d = new Date(base); d.setDate(base.getDate()+i);
    const ds = todayStr(d);
    strip += `<button class="day-chip ${ds===todayStr()?'today':''} ${ds===selectedDate?'selected':''}" data-date="${ds}">
      <div class="dow">${fmtDow(d)}</div><div class="dnum">${d.getDate()}</div></button>`;
  }

  const dayBlocks = state.timeblocks.filter(b=> matchesDate(b, selectedDate));
  const startHour=5, endHour=23;
  let hours='';
  for(let h=startHour; h<=endHour; h++){
    hours += `<div class="hour-row" data-hour="${h}"><div class="hour-label">${pad(h)}:00</div><div class="hour-slot" data-hour="${h}"></div></div>`;
  }

    <div class="section-title">📊 Activity Breakdown</div>
    <div class="range-toggle">
      ${['day','week','month','year'].map(r=>`<button data-range="${r}" class="${calRange===r?'active':''}">${({day:'Hari',week:'Minggu',month:'Bulan',year:'Tahun'})[r]}</button>`).join('')}
    </div>
    <div class="chart-card" id="chartCard"></div>
    <div style="height:10px"></div>
  `;

  el.querySelectorAll('[data-date]').forEach(b=> b.onclick=()=>{ selectedDate=b.dataset.date; renderCalendar(); });
  el.querySelectorAll('.hour-slot').forEach(s=> s.onclick=()=> openAddBlock(selectedDate, parseInt(s.dataset.hour)) );
  el.querySelectorAll('[data-range]').forEach(b=> b.onclick=()=>{ calRange=b.dataset.range; renderCalendar(); });

  // position blocks
  const wrap = document.getElementById('timelineWrap');
  const rowH = 56;
  dayBlocks.forEach(b=>{
    const [sh,sm] = b.start.split(':').map(Number);
    const [eh,em] = b.end.split(':').map(Number);
    if(sh<startHour) return;
    const top = (sh-startHour)*rowH + (sm/60)*rowH + 10;
    let dur = ((eh*60+em)-(sh*60+sm));
    if(dur<=0) dur=30;
    const height = Math.max(30,(dur/60)*rowH - 4);
    const cat = catById(b.categoryId);
    const div = document.createElement('div');
    div.className = 'block-card' + (b.status==='done'?' done':'') + (b.status==='active'?' active':'');
    div.style.top = top+'px'; div.style.height=height+'px';
    div.style.background = (cat? cat.color:'#8b7fd6');
    div.innerHTML = `<div>${cat?cat.icon+' ':''}${b.name}</div><div class="bt">${b.start}–${b.end}${b.visibility==='private'?' · 🔒':''}</div>`;
    div.onclick = (e)=>{ e.stopPropagation(); openBlockDetail(b.id); };
    wrap.appendChild(div);
  });

  renderStatsChart();
}

function matchesDate(block, dateStr){
  if(block.date===dateStr) return true;
  if(block.repeat==='none') return false;
  const target = new Date(dateStr); const start = new Date(block.date);
  if(target<start) return false;
  if(block.repeat==='daily') return true;
  if(block.repeat==='weekly') return target.getDay()===start.getDay();
  return false;
}

function renderStatsChart(){
  const cc = document.getElementById('chartCard');
  const now = new Date(selectedDate);
  const doneBlocks = state.timeblocks.filter(b=>b.status==='done' && b.completedAt);
  const inRange = doneBlocks.filter(b=>{
    const d = new Date(b.completedAt);
    if(calRange==='day') return todayStr(d)===selectedDate;
    if(calRange==='week'){ const diff=(d-now)/86400000; return diff>=-7 && diff<=0; }
    if(calRange==='month') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    if(calRange==='year') return d.getFullYear()===now.getFullYear();
  });
  const totals={};
  inRange.forEach(b=>{ totals[b.categoryId]=(totals[b.categoryId]||0)+(b.actualMinutes||0); });
  const entries = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){ cc.innerHTML = `<div class="empty-state"><span class="ee">📈</span>Belum ada aktivitas selesai di rentang ini.</div>`; return; }
  const max = Math.max(...entries.map(e=>e[1]));
  cc.innerHTML = entries.map(([cid,min])=>{
    const cat = catById(cid);
    const pct = Math.round((min/max)*100);
    return `<div class="bar-row"><div class="bl">${cat?cat.icon:'❔'} ${cat?cat.name:'Lainnya'}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat?cat.color:'#888'}"></div></div>
      <div class="bv">${min}m</div></div>`;
  }).join('');
}

    document.getElementById('wizBack').onclick=()=>showWizardStep(4);
    document.getElementById('wizSave').onclick=saveWizardBlock;
  }

/* ---------- Block detail / timer ---------- */
let activeTimerInterval=null;
function openBlockDetail(id){
  const b = state.timeblocks.find(x=>x.id===id);
  if(!b) return;
  const cat = catById(b.categoryId); const sub = subById(cat,b.subId);
  renderBlockDetail(b, cat, sub);
}
function renderBlockDetail(b, cat, sub){
  const isActive = b.status==='active';
  let timerDisplay='00:00';
  if(isActive){
    const el = Math.floor((Date.now()-b.startedAt)/1000)+b.elapsedSec;
    timerDisplay = fmtTimer(el);
  }
  const subtasksHtml = (b.subtasks||[]).map(st=>`
    <div class="subtask-row"><input type="checkbox" ${st.done?'checked':''} data-stdone="${st.id}" style="width:16px;height:16px;"><span style="flex:1;font-size:12.5px;${st.done?'text-decoration:line-through;color:var(--text-dim);':''}">${st.text}</span></div>`).join('') || '<div style="font-size:11.5px;color:var(--text-dim);">Tidak ada subtask.</div>';

  openSheet(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <div class="cat-icon" style="background:${cat?cat.color:'#888'}22;color:${cat?cat.color:'#888'};font-size:18px;">${cat?cat.icon:'❔'}</div>
      <div style="flex:1;"><div style="font-weight:700;font-size:15px;">${b.name}</div>
      <div style="font-size:11px;color:var(--text-dim);">${cat?cat.name:''}${sub?' · '+sub.name:''} · ${b.start}–${b.end} · ${b.visibility==='private'?'🔒 Private':'🌐 Public'}</div></div>
      <button class="icon-btn" id="delBlockBtn">🗑️</button>
    </div>
    <div style="text-align:center;padding:22px 0;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;letter-spacing:1px;" id="timerNum">${timerDisplay}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${b.status==='done'?'Selesai ✔️':(isActive?'Sedang berjalan…':'Belum dimulai')}</div>
    </div>
    ${b.status!=='done'? `<button class="btn ${isActive?'btn-danger':'btn-primary'}" id="timerBtn" style="margin-bottom:16px;">${isActive?'⏸ FINISH':'▶ START'}</button>` : ''}
    <div class="field"><label>Subtasks</label><div id="detailSubtasks">${subtasksHtml}</div></div>
  `);
  document.getElementById('delBlockBtn').onclick=()=>{ state.timeblocks = state.timeblocks.filter(x=>x.id!==b.id); persist(); closeSheet(); renderCalendar(); };
  document.querySelectorAll('[data-stdone]').forEach(cb=> cb.onchange=()=>{ const st=b.subtasks.find(s=>s.id===cb.dataset.stdone); st.done=cb.checked; persist(); });

  if(b.status!=='done'){
    document.getElementById('timerBtn').onclick=()=>{
      if(b.status!=='active'){
        b.status='active'; b.startedAt=Date.now(); persist();
        clearInterval(activeTimerInterval);
        activeTimerInterval = setInterval(()=>{
          const el = Math.floor((Date.now()-b.startedAt)/1000)+b.elapsedSec;
          const numEl = document.getElementById('timerNum'); if(numEl) numEl.textContent=fmtTimer(el);
        },1000);
        renderBlockDetail(b,cat,sub);
        renderCalendar();
      } else {
        clearInterval(activeTimerInterval);
        const totalSec = Math.floor((Date.now()-b.startedAt)/1000)+b.elapsedSec;
        finishBlock(b, cat, totalSec);
      }
    };
  }
}
function fmtTimer(sec){ const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return h>0? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`; }

function finishBlock(b, cat, totalSec){
  b.status='done'; b.elapsedSec=totalSec; b.completedAt=Date.now();
  b.actualMinutes = Math.max(1, Math.round(totalSec/60));
  const matchingQuest = state.questLog.find(q=> q.name.toLowerCase()===b.name.toLowerCase());
  let xp, statsAward;
  if(matchingQuest){ xp=matchingQuest.xp; statsAward=matchingQuest.stats; }
  else if(b.suggestedXp){ xp=b.suggestedXp; statsAward=b.suggestedStats||{}; }
  else { const h = heuristicXpStats(b.name, b.categoryId); xp=h.xp; statsAward=h.stats; }
  // scale slightly with duration
  const durBonus = Math.min(20, Math.floor(b.actualMinutes/15)*3);
  xp += durBonus;
  b.xpEarned = xp; b.statsEarned = statsAward;
  const result = grantXP(xp, statsAward, `Menyelesaikan "${b.name}"`, cat?cat.color:'#8b7fd6');
  persist();
  showCelebration(b, cat, xp, statsAward, result);
}

function showCelebration(b, cat, xp, statsAward, result){
  const statsHtml = Object.entries(statsAward||{}).map(([k,v])=>{
    const m = STAT_META[k]; return `<div class="rb">${m?m.icon:''} +${v} ${m?m.label:k}</div>`;
  }).join('');
  const overlay = document.getElementById('overlay');
  overlay.className='overlay center show';
  overlay.innerHTML = `<div class="celebrate-sheet">
    <div class="big-emoji">${result.leveledUp?'🎉':'✨'}</div>
    <h2>${result.leveledUp? 'Level Up! LV.'+state.profile.level : 'Quest Selesai!'}</h2>
    <div style="font-size:13px;color:var(--text-muted);">${b.name}</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--accent-gold);font-weight:700;margin:12px 0 4px;">+${xp} XP</div>
    <div class="reward-badge">${statsHtml}</div>
    ${result.reward? `<div style="background:var(--bg-panel-2);border-radius:14px;padding:12px;margin-top:8px;font-size:13px;">🎁 <b>Self Reward Time!</b><br>${result.reward}</div>` : ''}
    <div style="height:14px;"></div>
    <button class="btn btn-primary" id="celebNext">Lanjut</button>
    ${b.visibility==='public'? '<div style="height:10px;"></div><button class="btn btn-ghost" id="celebShare">📸 Buat Status</button>' : ''}
  </div>`;
  document.getElementById('celebNext').onclick=()=>{ overlay.classList.remove('show'); overlay.className='overlay'; renderCalendar(); renderTopbar(); if(currentView==='profile') renderProfile(); };
  const shareBtn = document.getElementById('celebShare');

}

        document.getElementById('nqApply').onclick=()=>{ qw.categoryId=rec.categoryId; qw.subId=rec.subId; qw.xp=rec.xp; qw.stats=rec.stats; draw(); };
      },500);

    document.querySelectorAll('[data-subchip]').forEach(b=> b.onclick=()=>{ qw.subId = qw.subId===b.dataset.subchip?null:b.dataset.subchip; draw(); });

      qw.name = document.getElementById('nqName').value.trim()||'Untitled Quest';
      qw.xp = parseInt(document.getElementById('nqXp').value)||20;

      persist(); closeSheet(); renderQuest();

    <div class="card" id="activityCard"></div>

    <div class="section-title">🎨 Theme & Tampilan</div>
    <div class="card">
      <div class="color-field"><label>Warna Latar</label><input type="color" id="thBg" value="${p.theme.bg}"></div>
      <div class="color-field"><label>Warna Panel</label><input type="color" id="thPanel" value="${p.theme.panel}"></div>
      <div class="color-field"><label>Warna Aksen (Gold)</label><input type="color" id="thAccent" value="${p.theme.accent}"></div>
      <div class="color-field"><label>Warna Aksen 2 (Violet)</label><input type="color" id="thAccent2" value="${p.theme.accent2}"></div>
      <div class="color-field"><label>Warna Tulisan</label><input type="color" id="thText" value="${p.theme.text}"></div>
    </div>
    <button class="btn btn-ghost" id="resetThemeBtn" style="margin-top:8px;">↺ Reset ke Default</button>
    <div style="height:24px;"></div>
  `;

  const activityCard = document.getElementById('activityCard');
  activityCard.innerHTML = state.activityLog.length? state.activityLog.slice(0,12).map(a=>`
    <div class="activity-row"><div class="adot" style="background:${a.color||'#8b7fd6'}"></div>
      <div class="atext">${a.text}<div class="atime">${timeAgo(a.timestamp)}</div></div><div class="axp">+${a.xp}</div></div>`).join('')
    : '<div class="empty-state">Belum ada aktivitas.</div>';

  document.getElementById('pNameDisplay').onclick=()=>{
    const nv = prompt('Ganti nama:', p.name);
    if(nv && nv.trim()){ p.name=nv.trim(); persist(); renderProfile(); renderTopbar(); }
  };
  document.getElementById('pAvatarBtn').onclick=()=> document.getElementById('avatarUpload').click();
  document.getElementById('avatarUpload').onchange=(e)=>{
    const f=e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload=()=>{ p.photoDataUrl=reader.result; persist(); renderProfile(); renderTopbar(); };
    reader.readAsDataURL(f);
  };
  ['thBg','thPanel','thAccent','thAccent2','thText'].forEach((id,i)=>{
    const keys=['bg','panel','accent','accent2','text'];
    document.getElementById(id).oninput=(e)=>{ p.theme[keys[i]]=e.target.value; applyTheme(); persist(); };
  });
  document.getElementById('resetThemeBtn').onclick=()=>{
    p.theme = defaultState().profile.theme; applyTheme(); persist(); renderProfile();
  };
}

/* =========================================================
   SHEET / OVERLAY helpers
   ========================================================= */
function openSheet(html){
  const overlay = document.getElementById('overlay');
  overlay.className='overlay show';
  overlay.innerHTML = `<div class="sheet" id="sheetContent"><div class="sheet-handle"></div><button class="sheet-close" id="sheetCloseBtn">✕</button>${html}</div>`;
  document.getElementById('sheetCloseBtn').onclick = closeSheet;
  overlay.onclick=(e)=>{ if(e.target===overlay) closeSheet(); };
}
function closeSheet(){
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('show');
  overlay.className='overlay';
}

document.getElementById('fabAdd').onclick = ()=> openAddBlock(selectedDate, undefined);

/* =========================================================
   INIT
   ========================================================= */
function renderAll(){ renderTopbar(); renderNav(); switchView(currentView); }
loadState();
</script>
</body>
</html>
